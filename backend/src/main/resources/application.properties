spring.application.name=vehicle-repair-hub
server.port=8080

# ─── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost/vrh_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Indhu@2627#Indhu
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=VRH_Super_Secret_Key_2024_TrustedVehicleRepairHub_JWT
